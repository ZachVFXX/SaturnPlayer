name: CI for Linux

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: sudo apt-get install -y nasm libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libwayland-dev libxkbcommon-dev
      - name: make
        run: make release_build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: saturn-linux
          path: saturn_player
