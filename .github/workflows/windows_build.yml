name: CI for Windows

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-nasm

      - name: Build
        shell: msys2 {0}
        run: |
          which make
          make release_build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: saturn-windows
          path: saturn_player.exe
