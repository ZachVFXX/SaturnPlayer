name: CI for Windows

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install NASM (needed by FFmpeg)
        shell: powershell
        run: choco install nasm --no-progress -y

      - name: Download and install w64devkit
        shell: powershell
        run: |
          $release = Invoke-RestMethod "https://api.github.com/repos/skeeto/w64devkit/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match "x64.*\.exe$" }
          if (-not $asset) { throw "w64devkit installer not found" }

          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile w64devkit-installer.exe

          # Silent install into runner temp directory
          Start-Process -FilePath ".\w64devkit-installer.exe" `
                        -ArgumentList "/S","/D=$env:RUNNER_TEMP\w64devkit" `
                        -Wait

          # Add bin directory to PATH
          "$env:RUNNER_TEMP\w64devkit\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build release
        shell: bash
        run: make release_build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: saturn-windows
          path: saturn_player.exe
