name: CI for Linux

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: configure
      run: ./configure
    - name: make
      run: make release_build
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
          name: saturn-linux
          path: saturn_player
